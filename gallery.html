<html lang="en" data-theme="dark"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Alpha Iota Chapter | Kappa Alpha Psi® Fraternity, Inc.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&amp;family=Darker+Grotesque:wght@300;600;800&amp;family=Permanent+Marker&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme (Default) */
            --color-background: #121212;
            --color-secondary-bg: #000000;
            --color-primary: #dc143c;
            --color-text: #ffffff;
            --color-text-secondary: #ffffff;
            --color-card-bg: #000000;
            --color-overlay: rgba(0, 0, 0, 0.6);
            --transition: all 0.3s ease-in-out;
        }
        
        /* Light Theme Variables */
        [data-theme="light"] {
            --color-background: #F5F5DC; /* Cream/beige */
            --color-secondary-bg: #ffffff;
            --color-primary: #dc143c;  /* Keep crimson accent */
            --color-text: #000000;     /* Dark text color for light theme */
            --color-text-secondary: #fafafa;
            --color-card-bg: #f2f2e6;
            --color-overlay: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Darker Grotesque', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #000000;
            z-index: 1000;
            padding: 1rem 0;
            transition: background-color 0.3s ease;
        }
        
        [data-theme="light"] .nav {
            background-color: transparent;
            backdrop-filter: blur(10px);
        }

        .nav-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 90%;
            padding: 0.5rem 0;
        }

        .logo {
            text-decoration: none;
            color: var(--color-text);
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        [data-theme="light"] .logo {
            color: #000000;
        }

        .menu {
            display: flex;
            gap: 2rem;
            justify-content: center;
            width: 100%;
        }

        .menu-link {
            text-decoration: none;
            color: var(--color-text);
            font-family: 'Syncopate', sans-serif;
            text-transform: uppercase;
            transition: var(--transition);
            font-size: 0.9rem;
            position: relative;
            padding-bottom: 4px;
        }
        
        [data-theme="light"] .menu-link {
            color: #000000;
        }

        .menu-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--color-primary);
            transition: var(--transition);
        }

        .menu-link:hover:after {
            width: 100%;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: none;
            border: none;
            color: var(--color-text);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 1rem;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: relative;
            width: 40px;
            height: 40px;
            overflow: hidden;
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
        }
        
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }
        
        .theme-toggle:active {
            transform: scale(0.9);
        }
        
        .theme-toggle .fa-sun {
            position: absolute;
            opacity: 0;
            transform: rotate(-180deg) scale(0.5);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        
        .theme-toggle .fa-moon {
            position: relative;
            opacity: 1;
            transform: rotate(0) scale(1);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        
        [data-theme="light"] .theme-toggle {
            box-shadow: 0 0 10px 2px rgba(220, 20, 60, 0.3);
            color: #000000;
        }
        
        [data-theme="light"] .theme-toggle .fa-sun {
            opacity: 1;
            transform: rotate(0) scale(1);
        }
        
        [data-theme="light"] .theme-toggle .fa-moon {
            opacity: 0;
            transform: rotate(180deg) scale(0.5);
        }
        
        .page-title {
            text-align: center;
            font-family: 'Syncopate', sans-serif;
            font-size: 2.5rem;
            margin: 180px 0 40px;
            color: var(--color-primary);
            text-transform: uppercase;
        }

        /* Gallery Styles */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .gallery-tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }
        
        .gallery-tab {
            background: none;
            border: none;
            color: var(--color-text);
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            padding: 0.8rem 1.5rem;
            margin: 0 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        
        .gallery-tab:after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--color-primary);
            transition: var(--transition);
        }
        
        .gallery-tab.active {
            color: var(--color-primary);
        }
        
        .gallery-tab.active:after {
            width: 80%;
        }
        
        .gallery-content {
            display: none;
        }
        
        .gallery-content.active {
            display: block;
        }
        
        .photos-grid, .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .photo-item, .video-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .photo-item:hover, .video-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .photo-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .photo-item:hover img {
            transform: scale(1.1);
        }
        
        .video-item {
            aspect-ratio: 16/9;
        }
        
        .video-item iframe, .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-content {
            max-width: 80%;
            max-height: 80vh;
        }
        
        .modal-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .nav-inner {
                flex-direction: column;
                text-align: center;
                padding: 0.5rem 1rem;
            }

            .logo {
                font-size: 1.2rem;
                margin-bottom: 0.5rem;
            }

            .menu {
                margin-top: 0.5rem;
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }
            
            .menu-link {
                font-size: 0.8rem;
            }
            
            .page-title {
                font-size: 1.8rem;
                margin: 120px 0 30px;
            }
            
            .gallery-container {
                padding: 1rem;
            }
            
            .gallery-tabs {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 0.5rem;
                justify-content: center;
            }
            
            .gallery-tab {
                font-size: 0.8rem;
                padding: 0.5rem 1rem;
            }
            
            .gallery-tab:after {
                bottom: -0.5rem;
            }
            
            .photos-grid, .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.8rem;
            }
            
            .photo-item img {
                height: 180px;
            }
            
            .modal-content {
                max-width: 95%;
            }
            
            .theme-toggle {
                width: 35px;
                height: 35px;
                margin-top: 0.5rem;
            }
            
            .footer {
                padding: 2rem 0;
            }
            
            .social-icons {
                gap: 1.5rem;
            }
        }

        /* Footer Styles */
        .footer {
            background: var(--color-secondary-bg);
            padding: 3rem 0;
            margin-top: 4rem;
            border-top: 1px solid rgba(220, 20, 60, 0.1);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        [data-theme="light"] .footer {
            color: #333333;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
        }

        .social-icons {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .social-link {
            color: var(--color-text);
            font-size: 1.5rem;
            transition: var(--transition);
        }
        
        .social-link:hover {
            color: var(--color-primary);
            transform: translateY(-3px);
        }

        .copyright {
            font-family: 'Darker Grotesque', sans-serif;
            font-size: 0.8rem;
            margin-top: 1rem;
            opacity: 0.8;
        }
    </style>

    <script>
        // Tab switching functionality
        const tabs = document.querySelectorAll('.gallery-tab');
        const contents = document.querySelectorAll('.gallery-content');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                
                // Update active tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // Update active content
                contents.forEach(content => {
                    content.classList.remove('active');
                    if (content.id === target) {
                        content.classList.add('active');
                    }
                });
            });
        });
        
        // Photo modal functionality
        const photoItems = document.querySelectorAll('.photo-item');
        const modal = document.getElementById('photo-modal');
        const modalImg = modal.querySelector('img');
        const modalClose = modal.querySelector('.modal-close');
        
        photoItems.forEach(item => {
            item.addEventListener('click', () => {
                const img = item.querySelector('img');
                modalImg.src = img.src;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });
        
        modalClose.addEventListener('click', () => {
            closeModal();
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        
        // Check for saved theme preference on load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Enable dark mode for content beneath hero if needed
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-dark-mode', 'true');
            } else {
                document.body.removeAttribute('data-dark-mode');
            }
        });
        
        // Theme toggle with localStorage saving
        themeToggle.addEventListener('click', function() {
            const htmlEl = document.documentElement;
            const currentTheme = htmlEl.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            // Update theme
            htmlEl.setAttribute('data-theme', newTheme);
            
            // Save theme preference
            localStorage.setItem('theme', newTheme);
            
            // Toggle dark mode status for sections if needed
            if (newTheme === 'light') {
                document.body.removeAttribute('data-dark-mode');
            } else {
                document.body.setAttribute('data-dark-mode', 'true');
            }
        });
    </script>
